<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSINT Hub - Intelligence Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌐</text></svg>">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <div class="logo">
                <svg class="logo-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="2" y1="12" x2="22" y2="12"/>
                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                </svg>
                <span class="logo-text">OSINT<span class="logo-accent">Hub</span></span>
            </div>
        </div>
        <div class="header-center">
            <div class="tab-bar">
                <button class="tab active" data-tab="map">Map</button>
                <button class="tab" data-tab="news">Live News</button>
                <button class="tab" data-tab="tools">Tools</button>
            </div>
        </div>
        <div class="header-right">
            <div class="clock">
                <div class="clock-utc">
                    <span class="clock-label">UTC</span>
                    <span class="clock-time" id="clock-utc">--:--:--</span>
                </div>
                <div class="clock-local">
                    <span class="clock-label">LOCAL</span>
                    <span class="clock-time" id="clock-local">--:--:--</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Layout -->
    <div class="layout">
        <!-- Sidebar - Layer Controls -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-content" id="sidebar-content">
                <!-- Map layers panel -->
                <div class="sidebar-panel" id="panel-map">
                    <div class="sidebar-section-label">MAP LAYERS</div>

                    <label class="layer-toggle">
                        <input type="checkbox" id="layer-flights" checked>
                        <span class="layer-icon" style="color: #00d4ff">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17.8 19.2L16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.4-.1.9.3 1.1L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.7 5.3c.2.4.7.5 1.1.3l.5-.3c.4-.2.6-.7.5-1.1z"/></svg>
                        </span>
                        <span class="layer-name">Aircraft</span>
                        <span class="layer-count" id="flight-count">0</span>
                    </label>

                    <label class="layer-toggle">
                        <input type="checkbox" id="layer-earthquakes" checked>
                        <span class="layer-icon" style="color: #ff6644">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                        </span>
                        <span class="layer-name">Earthquakes</span>
                        <span class="layer-count" id="quake-count">0</span>
                    </label>

                    <label class="layer-toggle">
                        <input type="checkbox" id="layer-fires">
                        <span class="layer-icon" style="color: #ff4400">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2c1 4-2 6-2 10a4 4 0 0 0 8 0c0-4-3-6-2-10M9.5 22c-1.5-1-2.5-3-2.5-5a5 5 0 0 1 3-4.5"/></svg>
                        </span>
                        <span class="layer-name">Fires (FIRMS)</span>
                        <span class="layer-count" id="fire-count">0</span>
                    </label>

                    <label class="layer-toggle">
                        <input type="checkbox" id="layer-weather">
                        <span class="layer-icon" style="color: #ffcc00">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 16.9A5 5 0 0 0 18 7h-1.26a8 8 0 1 0-11.62 9"/><polyline points="13 11 9 17 15 17 11 23"/></svg>
                        </span>
                        <span class="layer-name">Weather Radar</span>
                    </label>

                    <label class="layer-toggle">
                        <input type="checkbox" id="layer-clouds">
                        <span class="layer-icon" style="color: #aaaacc">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>
                        </span>
                        <span class="layer-name">Cloud Cover</span>
                    </label>

                    <label class="layer-toggle">
                        <input type="checkbox" id="layer-wind">
                        <span class="layer-icon" style="color: #44bbff">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"/></svg>
                        </span>
                        <span class="layer-name">Wind Speed</span>
                    </label>

                    <label class="layer-toggle">
                        <input type="checkbox" id="layer-temp">
                        <span class="layer-icon" style="color: #ff6688">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/></svg>
                        </span>
                        <span class="layer-name">Temperature</span>
                    </label>

                    <div class="sidebar-divider"></div>
                    <div class="sidebar-section-label">BASE MAP</div>

                    <label class="layer-toggle">
                        <input type="radio" name="basemap" value="dark" checked>
                        <span class="layer-name">Dark</span>
                    </label>
                    <label class="layer-toggle">
                        <input type="radio" name="basemap" value="satellite">
                        <span class="layer-name">Satellite</span>
                    </label>
                    <label class="layer-toggle">
                        <input type="radio" name="basemap" value="streets">
                        <span class="layer-name">Streets</span>
                    </label>

                    <div class="sidebar-divider"></div>
                    <div class="sidebar-section-label">DATA REFRESH</div>
                    <div class="refresh-info">
                        <div class="refresh-row">
                            <span>Aircraft</span>
                            <span id="refresh-flights">--</span>
                        </div>
                        <div class="refresh-row">
                            <span>Earthquakes</span>
                            <span id="refresh-quakes">--</span>
                        </div>
                        <div class="refresh-row">
                            <span>Fires</span>
                            <span id="refresh-fires">--</span>
                        </div>
                    </div>
                </div>

                <!-- News panel -->
                <div class="sidebar-panel hidden" id="panel-news">
                    <div class="sidebar-section-label">LIVE NEWS CHANNELS</div>
                    <div class="news-channel-list" id="news-channel-list">
                        <!-- Rendered by JS -->
                    </div>
                </div>

                <!-- Tools panel -->
                <div class="sidebar-panel hidden" id="panel-tools">
                    <div class="sidebar-section-label">SEARCH TOOLS</div>
                    <input type="text" id="tool-search" class="tool-search-input" placeholder="Search tools...">
                    <div class="tools-list" id="tools-list">
                        <!-- Rendered by JS -->
                    </div>
                </div>
            </div>
        </nav>

        <!-- Sidebar overlay for mobile -->
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <!-- Main Content -->
        <main class="main-content" id="main-content">
            <!-- Map view -->
            <div class="view active" id="view-map">
                <div id="map"></div>
            </div>

            <!-- News view -->
            <div class="view" id="view-news">
                <div class="news-grid" id="news-grid">
                    <!-- Rendered by JS -->
                </div>
            </div>

            <!-- Tools view -->
            <div class="view" id="view-tools">
                <div class="tools-grid" id="tools-grid">
                    <!-- Rendered by JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- Status Bar -->
    <footer class="status-bar">
        <div class="status-left">
            <span class="status-indicator active"></span>
            <span id="status-text">Map View</span>
        </div>
        <div class="status-center">
            <span id="status-coords">--</span>
        </div>
        <div class="status-right">
            <span id="status-zoom">Zoom: --</span>
        </div>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
