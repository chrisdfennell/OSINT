<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSINT Dashboard</title>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/panels.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌐</text></svg>">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <div class="logo">
                <svg class="logo-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="2" y1="12" x2="22" y2="12"/>
                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                </svg>
                <span class="logo-text">OSINT<span class="logo-accent">Hub</span></span>
            </div>
        </div>
        <div class="header-center">
            <div class="search-container">
                <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input type="text" id="search-input" class="search-input" placeholder="Search tools... ( / )" autocomplete="off">
                <kbd class="search-kbd">/</kbd>
            </div>
        </div>
        <div class="header-right">
            <div class="clock" id="clock">
                <div class="clock-utc">
                    <span class="clock-label">UTC</span>
                    <span class="clock-time" id="clock-utc">--:--:--</span>
                </div>
                <div class="clock-local">
                    <span class="clock-label">LOCAL</span>
                    <span class="clock-time" id="clock-local">--:--:--</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Layout -->
    <div class="layout">
        <!-- Sidebar -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-content" id="sidebar-content">
                <!-- Rendered by sidebar.js -->
            </div>
        </nav>

        <!-- Sidebar overlay for mobile -->
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <!-- Main Content -->
        <main class="main-content" id="main-content">
            <!-- Rendered by panel-renderer.js -->
        </main>
    </div>

    <!-- Status Bar -->
    <footer class="status-bar">
        <div class="status-left">
            <span class="status-indicator active"></span>
            <span id="status-category">Dashboard</span>
        </div>
        <div class="status-center">
            <span id="status-tool-count">0 tools available</span>
        </div>
        <div class="status-right">
            <span id="status-favorites">0 favorites</span>
            <span class="status-separator">|</span>
            <span id="status-active-feeds">0 active feeds</span>
        </div>
    </footer>

    <script type="module" src="js/app.js"></script>
</body>
</html>
