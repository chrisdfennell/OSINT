<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSINT Hub - Intelligence Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.18.3/dist/leaflet-geoman.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌐</text></svg>">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <div class="logo">
                <svg class="logo-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="2" y1="12" x2="22" y2="12"/>
                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                </svg>
                <span class="logo-text">OSINT<span class="logo-accent">Hub</span></span>
            </div>
        </div>
        <div class="header-center">
            <div class="tab-bar">
                <button class="tab active" data-tab="map">Map</button>
                <button class="tab" data-tab="news">Live News</button>
                <button class="tab" data-tab="tools">Tools</button>
            </div>
            <div class="search-box">
                <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input type="text" id="search-input" placeholder="Search places…" autocomplete="off">
                <div class="search-results" id="search-results"></div>
            </div>
        </div>
        <div class="header-right">
            <div class="clock">
                <div class="clock-utc">
                    <span class="clock-label">UTC</span>
                    <span class="clock-time" id="clock-utc">--:--:--</span>
                </div>
                <div class="clock-local">
                    <span class="clock-label">LOCAL</span>
                    <span class="clock-time" id="clock-local">--:--:--</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Layout -->
    <div class="layout">
        <!-- Sidebar - Layer Controls -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-content" id="sidebar-content">
                <!-- Map layers panel -->
                <div class="sidebar-panel" id="panel-map">

                    <!-- Hot Spots (dynamic) -->
                    <div class="sidebar-group" data-group="hotspots">
                        <button class="sidebar-group-header" type="button">
                            <svg class="chevron" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                            <span>Hot Spots</span>
                        </button>
                        <div class="sidebar-group-body">
                            <div class="hotspots-list" id="hotspots-list"></div>
                        </div>
                    </div>

                    <!-- Transit -->
                    <div class="sidebar-group" data-group="transit">
                        <button class="sidebar-group-header" type="button">
                            <svg class="chevron" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                            <span>Transit</span>
                        </button>
                        <div class="sidebar-group-body">

                            <label class="layer-toggle">
                                <input type="checkbox" id="layer-flights" checked>
                                <span class="layer-icon" style="color: #00d4ff">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17.8 19.2L16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.4-.1.9.3 1.1L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.7 5.3c.2.4.7.5 1.1.3l.5-.3c.4-.2.6-.7.5-1.1z"/></svg>
                                </span>
                                <span class="layer-name">Aircraft</span>
                                <span class="layer-count" id="flight-count">0</span>
                            </label>

                            <label class="layer-toggle">
                                <input type="checkbox" id="layer-vessels">
                                <span class="layer-icon" style="color: #44cc88">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 20l.8-2.8A2 2 0 0 1 4.7 16h14.6a2 2 0 0 1 1.9 1.2L22 20"/><path d="M4 16l-1.4-5.2A1 1 0 0 1 3.6 9.6L12 6l8.4 3.6a1 1 0 0 1 1 1.2L20 16"/><path d="M12 6V2"/></svg>
                                </span>
                                <span class="layer-name">Ships (AIS)</span>
                                <span class="layer-count" id="vessel-count">0</span>
                            </label>

                        </div>
                    </div>

                    <!-- Natural Events -->
                    <div class="sidebar-group" data-group="natural">
                        <button class="sidebar-group-header" type="button">
                            <svg class="chevron" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                            <span>Natural Events</span>
                        </button>
                        <div class="sidebar-group-body">

                            <label class="layer-toggle">
                                <input type="checkbox" id="layer-earthquakes" checked>
                                <span class="layer-icon" style="color: #ff6644">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                                </span>
                                <span class="layer-name">Earthquakes</span>
                                <span class="layer-count" id="quake-count">0</span>
                            </label>

                            <label class="layer-toggle">
                                <input type="checkbox" id="layer-fires">
                                <span class="layer-icon" style="color: #ff4400">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2c1 4-2 6-2 10a4 4 0 0 0 8 0c0-4-3-6-2-10M9.5 22c-1.5-1-2.5-3-2.5-5a5 5 0 0 1 3-4.5"/></svg>
                                </span>
                                <span class="layer-name">Fires (FIRMS)</span>
                                <span class="layer-count" id="fire-count">0</span>
                            </label>

                            <label class="layer-toggle">
                                <input type="checkbox" id="layer-volcanoes">
                                <span class="layer-icon" style="color: #ff6622">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 20l6-12 3 6 2-4 5 10z"/></svg>
                                </span>
                                <span class="layer-name">Volcanoes</span>
                                <span class="layer-count" id="volcano-count">0</span>
                            </label>

                            <label class="layer-toggle">
                                <input type="checkbox" id="layer-cyclones">
                                <span class="layer-icon" style="color: #ff44aa">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 3c5 0 8 3 8 7 0 3-2 5-4 5-1 0-2-.5-2-2 0 2-1 3-3 3-3 0-6-2-6-6 0-4 3-7 7-7z"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/></svg>
                                </span>
                                <span class="layer-name">Cyclones</span>
                                <span class="layer-count" id="cyclone-count">0</span>
                            </label>

                            <label class="layer-toggle">
                                <input type="checkbox" id="layer-lightning">
                                <span class="layer-icon" style="color: #ffe066">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="13 2 4 14 11 14 9 22 20 10 13 10 13 2"/></svg>
                                </span>
                                <span class="layer-name">Lightning</span>
                                <span class="layer-count" id="lightning-count">0</span>
                            </label>

                        </div>
                    </div>

                    <!-- Weather -->
                    <div class="sidebar-group" data-group="weather">
                        <button class="sidebar-group-header" type="button">
                            <svg class="chevron" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                            <span>Weather</span>
                        </button>
                        <div class="sidebar-group-body">

                            <label class="layer-toggle">
                                <input type="checkbox" id="layer-weather">
                                <span class="layer-icon" style="color: #ffcc00">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 16.9A5 5 0 0 0 18 7h-1.26a8 8 0 1 0-11.62 9"/><polyline points="13 11 9 17 15 17 11 23"/></svg>
                                </span>
                                <span class="layer-name">Precip Radar</span>
                            </label>

                            <label class="layer-toggle">
                                <input type="checkbox" id="layer-rainviewer">
                                <span class="layer-icon" style="color: #44aaff">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 19v2M12 17v4M16 19v2M20 16.58A5 5 0 0 0 18 7h-1.26a8 8 0 1 0-11.62 9"/></svg>
                                </span>
                                <span class="layer-name">Rain Radar</span>
                            </label>

                            <label class="layer-toggle">
                                <input type="checkbox" id="layer-nexrad">
                                <span class="layer-icon" style="color: #00ff88">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
                                </span>
                                <span class="layer-name">NEXRAD (US)</span>
                            </label>

                            <label class="layer-toggle">
                                <input type="checkbox" id="layer-clouds">
                                <span class="layer-icon" style="color: #aaaacc">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>
                                </span>
                                <span class="layer-name">Satellite IR</span>
                            </label>

                            <label class="layer-toggle">
                                <input type="checkbox" id="layer-wind">
                                <span class="layer-icon" style="color: #44bbff">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"/></svg>
                                </span>
                                <span class="layer-name">Wind Speed</span>
                            </label>

                            <label class="layer-toggle">
                                <input type="checkbox" id="layer-temp">
                                <span class="layer-icon" style="color: #ff6688">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/></svg>
                                </span>
                                <span class="layer-name">Temperature</span>
                            </label>

                        </div>
                    </div>

                    <!-- Space -->
                    <div class="sidebar-group" data-group="space">
                        <button class="sidebar-group-header" type="button">
                            <svg class="chevron" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                            <span>Space</span>
                        </button>
                        <div class="sidebar-group-body">

                            <label class="layer-toggle">
                                <input type="checkbox" id="layer-iss">
                                <span class="layer-icon" style="color: #ff44cc">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="10" y="10" width="4" height="4"/><rect x="2" y="11" width="6" height="2"/><rect x="16" y="11" width="6" height="2"/><path d="M12 2v8M12 14v8"/></svg>
                                </span>
                                <span class="layer-name">ISS</span>
                            </label>

                            <label class="layer-toggle">
                                <input type="checkbox" id="layer-satellites">
                                <span class="layer-icon" style="color: #ffaa33">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M4 4l3 3M20 20l-3-3M20 4l-3 3M4 20l3-3"/></svg>
                                </span>
                                <span class="layer-name">Satellites</span>
                                <span class="layer-count" id="satellite-count">0</span>
                            </label>

                            <label class="layer-toggle">
                                <input type="checkbox" id="layer-aurora">
                                <span class="layer-icon" style="color: #44ffaa">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 20c3-6 6-8 9-8s6 2 9 8"/><path d="M3 16c3-6 6-8 9-8s6 2 9 8"/><path d="M3 12c3-6 6-8 9-8s6 2 9 8"/></svg>
                                </span>
                                <span class="layer-name">Aurora</span>
                                <span class="layer-count" id="aurora-kp">--</span>
                            </label>

                        </div>
                    </div>

                    <!-- Intel / Infrastructure -->
                    <div class="sidebar-group" data-group="intel">
                        <button class="sidebar-group-header" type="button">
                            <svg class="chevron" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                            <span>Intel / Infrastructure</span>
                        </button>
                        <div class="sidebar-group-body">

                            <label class="layer-toggle">
                                <input type="checkbox" id="layer-gdelt">
                                <span class="layer-icon" style="color: #cc88ff">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4h16v16H4z"/><path d="M4 12h16M12 4v16"/></svg>
                                </span>
                                <span class="layer-name">GDELT Events</span>
                                <span class="layer-count" id="gdelt-count">0</span>
                            </label>

                            <label class="layer-toggle">
                                <input type="checkbox" id="layer-airquality">
                                <span class="layer-icon" style="color: #88cc00">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17.5 19a4.5 4.5 0 1 0-9 0"/><path d="M6 13a5 5 0 1 1 10 0"/><circle cx="12" cy="7" r="3"/></svg>
                                </span>
                                <span class="layer-name">Air Quality</span>
                                <span class="layer-count" id="airquality-count">0</span>
                            </label>

                            <label class="layer-toggle">
                                <input type="checkbox" id="layer-cables">
                                <span class="layer-icon" style="color: #88ccff">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 12c3-6 7-6 10 0s7 6 10 0"/></svg>
                                </span>
                                <span class="layer-name">Submarine Cables</span>
                            </label>

                            <label class="layer-toggle">
                                <input type="checkbox" id="layer-powerplants">
                                <span class="layer-icon" style="color: #ffdd44">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L4 14h7l-1 8 9-14h-7z"/></svg>
                                </span>
                                <span class="layer-name">Power Plants</span>
                                <span class="layer-count" id="powerplant-count">0</span>
                            </label>

                            <label class="layer-toggle">
                                <input type="checkbox" id="layer-webcams">
                                <span class="layer-icon" style="color: #ff99dd">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="6" width="14" height="12" rx="2"/><path d="M16 10l6-3v10l-6-3z"/></svg>
                                </span>
                                <span class="layer-name">Live Webcams</span>
                            </label>

                        </div>
                    </div>

                    <div class="sidebar-divider"></div>
                    <div class="sidebar-section-label">BASE MAP</div>

                    <label class="layer-toggle">
                        <input type="radio" name="basemap" value="dark" checked>
                        <span class="layer-name">Dark</span>
                    </label>
                    <label class="layer-toggle">
                        <input type="radio" name="basemap" value="satellite">
                        <span class="layer-name">Satellite</span>
                    </label>
                    <label class="layer-toggle">
                        <input type="radio" name="basemap" value="streets">
                        <span class="layer-name">Streets</span>
                    </label>

                    <div class="sidebar-divider"></div>
                    <div class="sidebar-section-label">DATA REFRESH</div>
                    <div class="refresh-info">
                        <div class="refresh-row">
                            <span>Aircraft</span>
                            <span id="refresh-flights">--</span>
                        </div>
                        <div class="refresh-row">
                            <span>Earthquakes</span>
                            <span id="refresh-quakes">--</span>
                        </div>
                        <div class="refresh-row">
                            <span>Fires</span>
                            <span id="refresh-fires">--</span>
                        </div>
                        <div class="refresh-row">
                            <span>Ships</span>
                            <span id="refresh-vessels">--</span>
                        </div>
                        <div class="refresh-row">
                            <span>GDELT</span>
                            <span id="refresh-gdelt">--</span>
                        </div>
                    </div>
                </div>

                <!-- News panel -->
                <div class="sidebar-panel hidden" id="panel-news">
                    <div class="sidebar-section-label">LIVE NEWS CHANNELS</div>
                    <div class="news-channel-list" id="news-channel-list">
                        <!-- Rendered by JS -->
                    </div>
                </div>

                <!-- Tools panel -->
                <div class="sidebar-panel hidden" id="panel-tools">
                    <div class="sidebar-section-label">SEARCH TOOLS</div>
                    <input type="text" id="tool-search" class="tool-search-input" placeholder="Search tools...">
                    <div class="tools-list" id="tools-list">
                        <!-- Rendered by JS -->
                    </div>
                </div>
            </div>
        </nav>

        <!-- Sidebar overlay for mobile -->
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <!-- Main Content -->
        <main class="main-content" id="main-content">
            <!-- Map view -->
            <div class="view active" id="view-map">
                <div id="map"></div>
                <div class="map-legends" id="map-legends">
                    <div class="map-legend" id="legend-wind">
                        <div class="map-legend-title">Wind Speed (m/s)</div>
                        <div class="map-legend-gradient" style="background: linear-gradient(to right, #ffffff, #bbeeff, #44bbff, #2266dd, #8844cc, #ff44aa);"></div>
                        <div class="map-legend-scale"><span>0</span><span>5</span><span>15</span><span>30</span><span>60</span><span>100+</span></div>
                    </div>
                    <div class="map-legend" id="legend-temp">
                        <div class="map-legend-title">Temperature (°C)</div>
                        <div class="map-legend-gradient" style="background: linear-gradient(to right, #9a00ff, #0066ff, #00ccff, #88ff88, #ffee44, #ff8800, #ff0000);"></div>
                        <div class="map-legend-scale"><span>-40</span><span>-20</span><span>0</span><span>10</span><span>20</span><span>30</span><span>40</span></div>
                    </div>
                </div>
            </div>

            <!-- News view -->
            <div class="view" id="view-news">
                <div class="news-grid" id="news-grid">
                    <!-- Rendered by JS -->
                </div>
            </div>

            <!-- Tools view -->
            <div class="view" id="view-tools">
                <div class="tools-grid" id="tools-grid">
                    <!-- Rendered by JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- News ticker -->
    <div class="ticker-bar">
        <div class="ticker-label">NEWS</div>
        <div class="ticker-viewport">
            <div class="ticker-track" id="ticker-track"></div>
        </div>
    </div>

    <!-- Status Bar -->
    <footer class="status-bar">
        <div class="status-left">
            <span class="status-indicator active"></span>
            <span id="status-text">Map View</span>
        </div>
        <div class="status-center">
            <span id="status-coords">--</span>
        </div>
        <div class="status-right">
            <span id="status-zoom">Zoom: --</span>
        </div>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.18.3/dist/leaflet-geoman.min.js"></script>
    <script src="https://unpkg.com/satellite.js@5.0.0/dist/satellite.min.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
